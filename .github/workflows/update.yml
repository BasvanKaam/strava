name: Update Strava data

on:
  schedule:
    - cron: "0 * * * *"        # elk uur
  workflow_dispatch:           # geeft je ook een knop om het zelf te starten

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Strava data ophalen
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python fetch_strava.py
      - name: Opslaan in repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add activities.json
          git commit -m "Update Strava data" || echo "Niks veranderd"
          git push
