<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Strava Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { --fc:#fc4c02; --bg:#f5f6f8; --card:#fff; --ink:#1a1a1a; --muted:#6b7280; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); padding:24px; }
  h1 { font-size:24px; margin-bottom:4px; }
  .sub { color:var(--muted); margin-bottom:24px; font-size:14px; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px; margin-bottom:24px; }
  .kpi { background:var(--card); border-radius:14px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .kpi .num { font-size:28px; font-weight:700; color:var(--fc); }
  .kpi .lbl { color:var(--muted); font-size:13px; margin-top:4px; }
  .grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:24px; }
  .card { background:var(--card); border-radius:14px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .card h2 { font-size:15px; margin-bottom:16px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th,td { text-align:left; padding:10px 8px; border-bottom:1px solid #eee; }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; }
  td.r,th.r { text-align:right; }
  @media(max-width:800px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
  <h1>Mijn Strava Dashboard</h1>
  <div class="sub" id="updated">Laden...</div>
  <div class="kpis" id="kpis"></div>
  <div class="grid">
    <div class="card"><h2>Kilometers per maand</h2><canvas id="monthChart"></canvas></div>
    <div class="card"><h2>Activiteiten per type</h2><canvas id="typeChart"></canvas></div>
  </div>
  <div class="card">
    <h2>Laatste activiteiten</h2>
    <table>
      <thead><tr>
        <th>Datum</th><th>Naam</th><th>Type</th>
        <th class="r">Afstand</th><th class="r">Tijd</th><th class="r">Tempo</th><th class="r">Hartslag</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
<script>
const FC = "#fc4c02";
function fmtTime(s){ if(!s) return "-"; const h=Math.floor(s/3600), m=Math.floor((s%3600)/60); return h>0?`${h}u ${m}m`:`${m}m`; }
function fmtPace(type,dist,secs){
  if(!dist||!secs) return "-";
  if(/run|walk|hike/i.test(type||"")){
    const p=secs/60/dist, mm=Math.floor(p), ss=Math.round((p-mm)*60);
    return `${mm}:${ss.toString().padStart(2,"0")} /km`;
  }
  return `${(dist/(secs/3600)).toFixed(1)} km/u`;
}
async function load(){
  const res = await fetch("activities.json?t=" + Date.now());
  const acts = await res.json();
  acts.sort((a,b)=> new Date(b.date) - new Date(a.date));

  const totalKm = acts.reduce((s,a)=>s+(a.distance_km||0),0);
  const totalTime = acts.reduce((s,a)=>s+(a.moving_time_s||0),0);
  const totalElev = acts.reduce((s,a)=>s+(a.elevation_m||0),0);
  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><div class="num">${acts.length}</div><div class="lbl">Activiteiten</div></div>
    <div class="kpi"><div class="num">${totalKm.toFixed(0)}</div><div class="lbl">Totaal km</div></div>
    <div class="kpi"><div class="num">${(totalTime/3600).toFixed(0)}</div><div class="lbl">Uren bewogen</div></div>
    <div class="kpi"><div class="num">${totalElev.toFixed(0)}</div><div class="lbl">Hoogtemeters</div></div>`;
  document.getElementById("updated").textContent = "Laatst geladen: " + new Date().toLocaleString("nl-NL");

  const byMonth = {};
  acts.forEach(a=>{ if(!a.date) return; const d=new Date(a.date);
    const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    byMonth[k]=(byMonth[k]||0)+(a.distance_km||0); });
  const months = Object.keys(byMonth).sort().slice(-12);
  new Chart(document.getElementById("monthChart"),{ type:"bar",
    data:{labels:months,datasets:[{data:months.map(m=>+byMonth[m].toFixed(1)),backgroundColor:FC}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});

  const byType = {};
  acts.forEach(a=> byType[a.type||"Onbekend"]=(byType[a.type||"Onbekend"]||0)+1 );
  new Chart(document.getElementById("typeChart"),{ type:"doughnut",
    data:{labels:Object.keys(byType),datasets:[{data:Object.values(byType),
      backgroundColor:["#fc4c02","#1e9db8","#8BC87A","#f59e0b","#6366f1","#ec4899","#94a3b8"]}]},
    options:{plugins:{legend:{position:"bottom"}}}});

  document.getElementById("rows").innerHTML = acts.slice(0,15).map(a=>`
    <tr>
      <td>${a.date?new Date(a.date).toLocaleDateString("nl-NL"):"-"}</td>
      <td>${a.name||"-"}</td><td>${a.type||"-"}</td>
      <td class="r">${(a.distance_km||0).toFixed(1)} km</td>
      <td class="r">${fmtTime(a.moving_time_s)}</td>
      <td class="r">${fmtPace(a.type,a.distance_km,a.moving_time_s)}</td>
      <td class="r">${a.avg_hr?Math.round(a.avg_hr)+" bpm":"-"}</td>
    </tr>`).join("");
}
load().catch(()=>{ document.getElementById("updated").textContent =
  "activities.json nog niet gevonden. Heeft de Action al een keer gedraaid?"; });
</script>
</body>
</html>
